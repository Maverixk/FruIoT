; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:heltec_wifi_lora_32_V3]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
lib_deps =
  heltecautomation/Heltec ESP32 Dev-Boards @ ^1.1.2
  adafruit/DHT sensor library
  adafruit/Adafruit Unified Sensor
  mathworks/ThingSpeak
upload_port = /dev/cu.usbserial-0001 #porta seriale su MacOS (Giammo e Luca?), da modificare se si usa un altro sistema operativo
#upload_port = COM3 #porta seriale su Windows (Linda), da modificare se si usa un altro sistema operativo
#monitor_port = COM3 #porta seriale su Windows (Linda), da modificare se si usa un altro sistema operativo
build_flags = -I include